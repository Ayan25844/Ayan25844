name: Update Trophies

on:
  schedule:
    - cron: "0 0 * * *" # Automatically updates every night at midnight
  workflow_dispatch: # Allows you to run it manually right away

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate Trophies SVG
        uses: ryo-ma/github-profile-trophy@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          options: '&theme=tokyonight&no-frame=true&no-bg=true&column=7'

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CACHE/
          git diff --quiet && git diff --staged --quiet || git commit -m "Updated profile trophies"
          git push