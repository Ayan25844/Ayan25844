name: Update Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# 🟢 ADD THIS BLOCK TO GRANT WRITE PERMISSIONS:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Trophies SVG
        uses: ryo-ma/github-profile-trophy@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: Ayan25844
          theme: tokyonight

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Updated profile trophies"
          git push