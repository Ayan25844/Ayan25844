name: Update Trophies

on:
  schedule:
    - cron: "0 0 * * *" # Automatically updates every night at midnight
  workflow_dispatch: # Allows you to run it manually right away

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Upgraded to v4 to fix the Node.js deprecation warning

      - name: Generate Trophies SVG
        uses: ryo-ma/github-profile-trophy@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Pass the arguments individually instead of inside an 'options' string:
          username: Ayan25844
          theme: tokyonight
          no-frame: true
          no-bg: true
          column: 7

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # The action automatically creates a directory named "treasure" or saves it locally.
          # Let's add everything to be safe so git can track it.
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Updated profile trophies"
          git push